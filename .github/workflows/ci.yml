name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check syntax (py_compile)
        run: |
          python -m py_compile run_meta_gen.py
          python -m py_compile compare_s3_bucket_counts.py
          python -m py_compile convert_to_ndjson.py
          python -m py_compile daily_metadata/daily_metadata.py

      - name: Run pytest
        run: |
          pytest
